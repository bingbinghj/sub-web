name: Build and Push Multi-Arch Docker Image to GHCR

on:
  push:
    branches:
      - master

# 添加权限控制，以便能够推送到 GHCR
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        # github.actor 会自动获取你的 GitHub 用户名
        username: ${{ github.actor }}
        # GITHUB_TOKEN 是 GitHub Actions 自动生成的，无需手动设置
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        # 标签格式必须为 ghcr.io/你的用户名/仓库名:latest
        tags: |
          ghcr.io/${{ github.repository_owner }}/subweb:latest
